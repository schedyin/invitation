<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Reset styles to ensure the injected templates look pixel-perfect */
    body { 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background-color: #f9f9f9; 
    }
    #loader { 
      font-family: 'IBM Plex Sans', sans-serif; 
      font-size: 1.2rem; 
      color: #555; 
    }
    #invitation-container { 
      width: 100%; 
      max-width: 100%; 
    }
  </style>
</head>
<body>
  
  <div id="loader">Loading invitation...</div>
  <div id="invitation-container"></div>

<script>
    // Initialize Supabase Client
    const supabaseClient = supabase.createClient(
      'https://jihtqbzrqymdkypicajz.supabase.co', 
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
    );

    // --- NEW: Date Formatter (YYYY-MM-DD to DD-MM-YYYY) ---
    function formatTeluguDate(dateStr) {
        if (!dateStr || !dateStr.includes('-')) return dateStr;
        const parts = dateStr.split('-');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateStr;
    }

    // --- NEW: Time Formatter (23:41 to రాత్రి 11:41 నిమిషాలకు) ---
    function formatTeluguTime(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return timeStr;
        let [hh, mm] = timeStr.split(':');
        let hour = parseInt(hh, 10);
        let period = '';
        
        // Determine the Telugu time of day
        if (hour >= 0 && hour < 12) period = 'ఉదయం'; // Morning
        else if (hour >= 12 && hour < 16) period = 'మధ్యాహ్నం'; // Afternoon
        else if (hour >= 16 && hour < 20) period = 'సాయంత్రం'; // Evening
        else period = 'రాత్రి'; // Night (20:00 to 23:59)
        
        // Convert to 12-hour format
        let hour12 = hour % 12;
        if (hour12 === 0) hour12 = 12;
        
        // Apply "గంటలకు" (hours) or "నిమిషాలకు" (minutes)
        if (mm === '00') {
            return `${period} ${hour12}:00 గంటలకు`;
        } else {
            return `${period} ${hour12}:${mm} నిమిషాలకు`;
        }
    }

    async function renderInvite() {
      let pathName = window.location.pathname.replace(/^\/|\/$/g, ''); 
      let inviteId = null;

      if (pathName && pathName !== 'index.html') {
        inviteId = pathName; 
      } else {
        const urlParams = new URLSearchParams(window.location.search);
        inviteId = urlParams.get('id');
      }

      if (!inviteId) {
        document.getElementById('loader').innerText = "Invalid Invitation Link.";
        return;
      }

      try {
        const { data: invite, error } = await supabaseClient
          .from('invitations')
          .select(`bride_name, groom_name, event_date, details, templates ( html_code )`)
          .eq('id', inviteId)
          .single();

        if (error || !invite || !invite.templates) {
          document.getElementById('loader').innerText = "Invitation not found.";
          return;
        }

        document.getElementById('loader').style.display = 'none';

        let html = invite.templates.html_code;

        // Combine all data into one object
        const allData = {
            bride_name: invite.bride_name,
            groom_name: invite.groom_name,
            event_date: invite.event_date,
            ...(invite.details || {})
        };

        // 1. Process {{#if tag}} ... {{/if}} to hide missing blocks
        html = html.replace(/{{#if\s+([a-zA-Z0-9-_]+)\s*}}(.*?){{\/if}}/gs, (match, key, content) => {
            if (allData[key] && allData[key].toString().trim() !== '') return content; 
            return ''; 
        });

        // 2. Standard Tag Replacements (With Date & Time Formatting!)
        for (const [key, value] of Object.entries(allData)) {
            let finalValue = value;
            
            if (typeof finalValue === 'string') {
                // If the key contains the word 'date', format it!
                if (key.includes('date')) finalValue = formatTeluguDate(finalValue);
                // If the key contains the word 'time', format it!
                if (key.includes('time')) finalValue = formatTeluguTime(finalValue);
                
                const regex = new RegExp(`{{${key}}}`, 'g');
                html = html.replace(regex, finalValue);
            }
        }

        // Cleanup empty tags
        html = html.replace(/{{[^{}]+}}/g, '');

        // Inject HTML
        document.getElementById('invitation-container').innerHTML = html;

        // --- NEW: FORCE SCRIPTS TO RUN ---
        // Browsers block <script> tags injected via innerHTML. This forces them to execute!
        const scripts = document.getElementById('invitation-container').getElementsByTagName('script');
        for (let i = 0; i < scripts.length; i++) {
            const newScript = document.createElement('script');
            if (scripts[i].src) {
                newScript.src = scripts[i].src;
            } else {
                newScript.textContent = scripts[i].innerHTML;
            }
            document.body.appendChild(newScript);
        }

      } catch (err) {
        document.getElementById('loader').innerText = "An error occurred while loading.";
      }
    }

    renderInvite();
  </script>
</body>
</html>
