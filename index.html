<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Reset styles to ensure the injected templates look pixel-perfect */
    body { 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background-color: #f9f9f9; 
    }
    #loader { 
      font-family: 'IBM Plex Sans', sans-serif; 
      font-size: 1.2rem; 
      color: #555; 
    }
    #invitation-container { 
      width: 100%; 
      max-width: 100%; 
    }
  </style>
</head>
<body>
  
  <div id="loader">Loading invitation...</div>
  <div id="invitation-container"></div>

<script>
    const supabaseClient = supabase.createClient(
      'https://jihtqbzrqymdkypicajz.supabase.co', 
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
    );

    // --- Formatters ---
    function formatTeluguDate(dateStr) {
        if (!dateStr || !dateStr.includes('-')) return dateStr;
        const parts = dateStr.split('-');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateStr;
    }

    function formatTeluguTime(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return timeStr;
        let [hh, mm] = timeStr.split(':');
        let hour = parseInt(hh, 10);
        let period = hour >= 0 && hour < 12 ? 'ఉదయం' : hour >= 12 && hour < 16 ? 'మధ్యాహ్నం' : hour >= 16 && hour < 20 ? 'సాయంత్రం' : 'రాత్రి';
        let hour12 = hour % 12 || 12;
        return mm === '00' ? `${period} ${hour12}:00 గంటలకు` : `${period} ${hour12}:${mm} నిమిషాలకు`;
    }

    // --- HTML Injector Logic ---
    function injectHTML(invite) {
        let html = invite.templates.html_code;
        const allData = { bride_name: invite.bride_name, groom_name: invite.groom_name, event_date: invite.event_date, ...(invite.details || {}) };

        html = html.replace(/{{#if\s+([a-zA-Z0-9-_]+)\s*}}(.*?){{\/if}}/gs, (match, key, content) => {
            return (allData[key] && allData[key].toString().trim() !== '') ? content : ''; 
        });

        for (const [key, value] of Object.entries(allData)) {
            let finalValue = value;
            if (typeof finalValue === 'string') {
                if (key.includes('date')) finalValue = formatTeluguDate(finalValue);
                if (key.includes('time')) finalValue = formatTeluguTime(finalValue);
                html = html.replace(new RegExp(`{{${key}}}`, 'g'), finalValue);
            }
        }

        html = html.replace(/{{[^{}]+}}/g, '');
        const formattedDate = new Date(invite.event_date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        html = html.replace(/{{event_date}}/g, formattedDate);

        document.getElementById('invitation-container').innerHTML = html;

        // Force scripts to run
        const scripts = document.getElementById('invitation-container').getElementsByTagName('script');
        for (let i = 0; i < scripts.length; i++) {
            const newScript = document.createElement('script');
            if (scripts[i].src) newScript.src = scripts[i].src;
            else newScript.textContent = scripts[i].innerHTML;
            document.body.appendChild(newScript);
        }
    }

    // --- Main Core Function ---
    async function renderInvite() {
      let pathName = window.location.pathname.replace(/^\/|\/$/g, ''); 
      let inviteId = pathName && pathName !== 'index.html' ? pathName : new URLSearchParams(window.location.search).get('id');

      if (!inviteId) return document.getElementById('loader').innerText = "Invalid Invitation Link.";

      // FEATURE 1: UNIQUE DEVICE TRACKING
      const viewKey = `viewed_${inviteId}`;
      if (!localStorage.getItem(viewKey)) {
          localStorage.setItem(viewKey, 'true'); // Mark this phone as having viewed it
          supabaseClient.rpc('increment_view_count', { row_id: inviteId }).then(); // Tell DB to add +1
      }

      // FEATURE 2: LOCAL CACHING (INSTANT LOAD)
      const cacheKey = `cache_${inviteId}`;
      const cachedData = localStorage.getItem(cacheKey);
      
      if (cachedData) {
          // If we have it saved locally, render it INSTANTLY and hide the loader
          injectHTML(JSON.parse(cachedData));
          document.getElementById('loader').style.display = 'none';
      }

      // Always fetch fresh data in the background (or show loader if no cache)
      try {
        const { data: invite, error } = await supabaseClient
          .from('invitations')
          .select(`bride_name, groom_name, event_date, details, templates ( html_code )`)
          .eq('id', inviteId)
          .single();

        if (error || !invite || !invite.templates) {
            if (!cachedData) document.getElementById('loader').innerText = "Invitation not found.";
            return;
        }

        // Save the fresh data to the phone's local storage for next time
        localStorage.setItem(cacheKey, JSON.stringify(invite));
        
        // If we didn't have cached data earlier, we inject the fresh HTML now
        if (!cachedData) {
            document.getElementById('loader').style.display = 'none';
            injectHTML(invite);
        }

      } catch (err) {
        if (!cachedData) document.getElementById('loader').innerText = "An error occurred while loading.";
      }
    }

    renderInvite();
  </script>
</body>
</html>
