<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h2>Create Invitation</h2>

<input id="bride" placeholder="Bride Name"><br><br>
<input id="groom" placeholder="Groom Name"><br><br>
<input id="date" placeholder="Date"><br><br>
<input id="venue" placeholder="Venue"><br><br>

<select id="template"></select><br><br>

<button onclick="createInvite()">Generate Link</button>

<p id="link"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL='https://jihtqbzrqymdkypicajz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw';

// ✅ FIXED NAME
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTemplates() {
  const { data } = await client.from('templates').select('*');

  const select = document.getElementById('template');

  data.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    select.appendChild(opt);
  });
}

loadTemplates();

// ✅ RENAMED FUNCTION
async function createInvite() {
  const bride_name = document.getElementById('bride').value;
  const groom_name = document.getElementById('groom').value;
  const date = document.getElementById('date').value;
  const venue = document.getElementById('venue').value;
  const template_id = document.getElementById('template').value;

  const { data } = await client
    .from('invitations')
    .insert([{ bride_name, groom_name, date, venue, template_id }])
    .select();

  const id = data[0].id;

  const url = window.location.origin + "/index.html?id=" + id;

  document.getElementById('link').innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;
}
</script>

</body>
</html>
