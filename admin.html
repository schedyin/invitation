<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F4F9; color: #0f172a; padding: 2rem; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { color: #2B1664; margin: 0; }
        .card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .badge-pending { background: #fef3c7; color: #b45309; }
        .badge-approved { background: #dcfce7; color: #166534; }
        .badge-declined { background: #fee2e2; color: #b91c1c; }
        .badge-admin { background: #e0e7ff; color: #4338ca; }
        select { padding: 6px; border-radius: 4px; font-family: inherit; }
        .btn-logout { background: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>✦ Admin Control Panel</h1>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Joined</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <tr><td colspan="4" style="text-align: center; color: #64748b;">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://jihtqbzrqymdkypicajz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw');

        async function checkAdmin() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            const { data: profile } = await supabaseClient.from('app_user_roles').select('status').eq('id', user.id).single();
            if (!profile || profile.status !== 'admin') {
                alert("Unauthorized Access!");
                window.location.href = 'login.html';
            } else {
                fetchUsers();
            }
        }

        async function fetchUsers() {
            const { data, error } = await supabaseClient.from('app_user_roles').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = '';

            if (error) { tbody.innerHTML = `<tr><td colspan="4">Error loading users</td></tr>`; return; }

            data.forEach(u => {
                const date = new Date(u.created_at).toLocaleDateString();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${u.email}</strong></td>
                    <td>${date}</td>
                    <td><span class="badge badge-${u.status}">${u.status}</span></td>
                    <td>
                        <select onchange="updateStatus('${u.id}', this.value)">
                            <option value="pending" ${u.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="approved" ${u.status === 'approved' ? 'selected' : ''}>Approve</option>
                            <option value="declined" ${u.status === 'declined' ? 'selected' : ''}>Decline</option>
                            <option value="admin" ${u.status === 'admin' ? 'selected' : ''}>Make Admin</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function updateStatus(userId, newStatus) {
            const { error } = await supabaseClient.from('app_user_roles').update({ status: newStatus }).eq('id', userId);
            if (error) alert("Error updating status: " + error.message);
            else fetchUsers(); // Refresh UI
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        checkAdmin();
    </script>
</body>
</html>
