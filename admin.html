<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Create Invitation</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
    #result-link { margin-top: 20px; padding: 10px; background: #e0f7fa; display: none; word-wrap: break-word;}
  </style>
</head>
<body>
  <h2>Generate Invitation Link</h2>
  
  <select id="template-select">
    <option value="">Loading templates...</option>
  </select>
  
  <input type="text" id="custom-id" placeholder="Custom Link ID (e.g., harsha-vardhini)">
  
  <input type="text" id="bride-name" placeholder="Bride's Name">
  <input type="text" id="groom-name" placeholder="Groom's Name">
  <input type="date" id="event-date">
  
  <button onclick="createInvite()">Generate Link</button>

  <div id="result-link"></div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://jihtqbzrqymdkypicajz.supabase.co', 
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
    );

    async function loadTemplates() {
      const { data, error } = await supabaseClient.from('templates').select('id, name');
      const select = document.getElementById('template-select');
      select.innerHTML = '<option value="">-- Select a Template --</option>';
      
      if (data) {
        data.forEach(t => {
          select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
      }
    }

    async function createInvite() {
      const template_id = document.getElementById('template-select').value;
      const custom_id = document.getElementById('custom-id').value.trim().toLowerCase().replace(/\s+/g, '-'); // Formats 'Harsha Vardhini' to 'harsha-vardhini'
      const bride_name = document.getElementById('bride-name').value;
      const groom_name = document.getElementById('groom-name').value;
      const event_date = document.getElementById('event-date').value;

      if (!template_id) return alert("Please select a template!");
      if (!custom_id) return alert("Please enter a custom Link ID!");

      // Pass the custom 'id' into the insert array
      const { data, error } = await supabaseClient
        .from('invitations')
        .insert([{ id: custom_id, bride_name, groom_name, event_date, template_id }])
        .select()
        .single();

      if (error) {
        // If someone tries to use an ID that already exists, Supabase throws a unique constraint error
        if (error.code === '23505') {
          alert('That custom ID is already taken! Please choose another one.');
        } else {
          alert('Error: ' + error.message);
        }
      } else {
        const linkBox = document.getElementById('result-link');
        const url = `${window.location.origin}/index.html?id=${data.id}`;
        linkBox.style.display = 'block';
        linkBox.innerHTML = `<strong>Success! Share this link:</strong><br><a href="${url}" target="_blank">${url}</a>`;
      }
    }

    loadTemplates();
  </script>
</body>
