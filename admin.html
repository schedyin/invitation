<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        /* --- DESIGN SYSTEM TOKENS --- */
        :root {
            --primary-dark: #012726;
            --accent-green: #33C375;
            --pure-white: #FFFFFF;
            --bg-light: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 16px;
            --ease-cubic: cubic-bezier(0.25, 0.8, 0.25, 1);
            --btn-shadow: 0 4px 12px rgba(1, 39, 38, 0.15);
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'IBM Plex Sans', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-main); 
            padding: 2rem 1rem; 
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
        }
        
        h1 { color: var(--primary-dark); margin: 0; font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        .btn-logout { 
            background: var(--pure-white); color: var(--danger-color); padding: 10px 20px; 
            border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; cursor: pointer; 
            font-weight: 600; font-family: inherit; font-size: 0.95rem;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-logout:hover { background: #fef2f2; border-color: var(--danger-color); }

        .card { 
            background: var(--pure-white); border-radius: var(--radius-lg); 
            padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            border: 1px solid var(--border-color); overflow: hidden;
        }

        /* --- TABLE STYLES --- */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--text-sub); font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        
        .email-cell { font-weight: 600; color: var(--text-main); }
        .date-cell { color: var(--text-sub); font-size: 0.95rem; }

        /* --- BADGES --- */
        .badge { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; text-align: center; }
        .badge-pending { background: #fef3c7; color: #b45309; }
        .badge-approved { background: #dcfce7; color: #166534; }
        .badge-declined { background: #fee2e2; color: #b91c1c; }
        .badge-admin { background: #e0e7ff; color: #4338ca; }

        /* --- SELECT DROPDOWN --- */
        .select-action { 
            padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.9rem;
            font-weight: 500; color: var(--text-main); border: 1px solid var(--border-color);
            background-color: var(--bg-light); cursor: pointer; outline: none; transition: 0.2s;
        }
        .select-action:hover { border-color: var(--text-sub); }
        .select-action:focus { border-color: var(--accent-green); box-shadow: 0 0 0 2px rgba(51, 195, 117, 0.2); }

        /* --- FEEDBACK --- */
        #loader { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(1, 39, 38, 0.1); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 12px; color: white; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 4000; text-align: center; }
        #toast.show { bottom: 40px; }
        #toast.success { background: #10b981; }
        #toast.error { background: #ef4444; }

        /* --- MOBILE RESPONSIVE TABLE (CARD VIEW) --- */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .btn-logout { width: 100%; justify-content: center; }
            .card { padding: 1rem; }
            
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; } /* Hide headers visually but keep for screen readers */
            
            tr { border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 1rem; padding: 1rem; background: var(--pure-white); }
            tr:last-child { margin-bottom: 0; }
            
            td { border: none; padding: 8px 0; position: relative; padding-left: 40%; text-align: left; }
            td::before { 
                position: absolute; top: 8px; left: 0; width: 35%; white-space: nowrap;
                font-weight: 600; color: var(--text-sub); font-size: 0.85rem; text-transform: uppercase;
            }
            
            /* Add Mobile Labels */
            td:nth-of-type(1)::before { content: "Email:"; }
            td:nth-of-type(2)::before { content: "Joined:"; }
            td:nth-of-type(3)::before { content: "Status:"; }
            td:nth-of-type(4)::before { content: "Action:"; }
            
            .email-cell { word-break: break-all; }
            .select-action { width: 100%; margin-top: 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><span class="material-symbols-outlined" style="font-size: 2rem;">admin_panel_settings</span> User Management</h1>
            <button class="btn-logout" onclick="logout()">
                <span class="material-symbols-outlined" style="font-size: 1.2rem;">logout</span>
                Logout
            </button>
        </div>

        <div class="card" style="padding: 0;">
            <div id="loader"><div class="spinner"></div></div>
            <table id="users-table" style="display: none;">
                <thead>
                    <tr>
                        <th>User Email</th>
                        <th>Date Joined</th>
                        <th>Current Status</th>
                        <th>Change Role</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- SUPABASE INIT ---
        const supabaseClient = supabase.createClient(
            'https://jihtqbzrqymdkypicajz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
        );

        // --- UI UTILS ---
        const showToast = (message, type = 'success') => { 
            const t = document.getElementById('toast'); 
            t.textContent = message; t.className = `show ${type}`; 
            setTimeout(() => { t.className = t.className.replace('show', ''); }, 3000); 
        };

        // --- AUTH & DATA LOGIC ---
        async function checkAdmin() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            const { data: profile } = await supabaseClient.from('app_user_roles').select('status').eq('id', user.id).single();
            if (!profile || profile.status !== 'admin') {
                window.location.replace('login.html'); // Kick unauthorized users out
            } else {
                fetchUsers();
            }
        }

        async function fetchUsers() {
            const { data, error } = await supabaseClient.from('app_user_roles').select('*').order('created_at', { ascending: false });
            
            document.getElementById('loader').style.display = 'none';
            const table = document.getElementById('users-table');
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = '';

            if (error) { 
                table.style.display = 'table';
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem;">Error loading users: ${error.message}</td></tr>`; 
                return; 
            }

            if (data.length === 0) {
                table.style.display = 'table';
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem; color: var(--text-sub);">No users found in the system.</td></tr>`;
                return;
            }

            data.forEach(u => {
                const date = new Date(u.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="email-cell">${u.email}</td>
                    <td class="date-cell">${date}</td>
                    <td><span class="badge badge-${u.status}">${u.status}</span></td>
                    <td>
                        <select class="select-action" onchange="updateStatus('${u.id}', this.value, '${u.email}')">
                            <option value="pending" ${u.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="approved" ${u.status === 'approved' ? 'selected' : ''}>✅ Approve</option>
                            <option value="declined" ${u.status === 'declined' ? 'selected' : ''}>🚫 Decline</option>
                            <option value="admin" ${u.status === 'admin' ? 'selected' : ''}>👑 Make Admin</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(row);
            });
            table.style.display = 'table';
        }

        async function updateStatus(userId, newStatus, userEmail) {
            // Safety confirmation for making new admins
            if (newStatus === 'admin') {
                if(!confirm(`Are you sure you want to grant full Admin privileges to ${userEmail}?`)) {
                    fetchUsers(); // reset dropdown if cancelled
                    return;
                }
            }

            const { error } = await supabaseClient.from('app_user_roles').update({ status: newStatus }).eq('id', userId);
            if (error) {
                showToast("Error updating user: " + error.message, "error");
                fetchUsers(); // reset dropdown on error
            } else {
                showToast(`Successfully updated ${userEmail} to ${newStatus}`, "success");
                fetchUsers(); // Refresh UI to update badges
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // Run security check on load
        checkAdmin();
    </script>
</body>
</html>
