<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Create Bilingual Invitation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap');
    body { font-family: 'IBM Plex Sans', sans-serif; padding: 2rem; background: #f4f4f9; }
    .card { background: white; padding: 2rem; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
    .input-group { margin-bottom: 15px; }
    label { font-weight: 600; font-size: 0.9rem; color: #333; }
    input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; font-family: inherit; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: 600; font-size: 1rem; margin-top: 10px; }
    button:hover { background: #005bb5; }
    #resultBox { margin-top: 20px; display: none; background: #e8f0fe; padding: 15px; border-radius: 4px; text-align: center; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="card">
    <h2>Create Invitation</h2>
    
    <div class="input-group">
      <label>Groom's Name (English)</label>
      <input type="text" id="groomEn" placeholder="e.g., Harsha" onblur="autoTranslate('groomEn', 'groomTe')">
    </div>
    <div class="input-group">
      <label>Groom's Name (Telugu) - Auto-filled, edit if needed</label>
      <input type="text" id="groomTe" placeholder="తెలుగులో...">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="input-group">
      <label>Bride's Name (English)</label>
      <input type="text" id="brideEn" placeholder="e.g., Priya" onblur="autoTranslate('brideEn', 'brideTe')">
    </div>
    <div class="input-group">
      <label>Bride's Name (Telugu) - Auto-filled, edit if needed</label>
      <input type="text" id="brideTe" placeholder="తెలుగులో...">
    </div>

    <button onclick="createInvitation()">Generate Magic Link</button>

    <div id="resultBox">
      <p style="margin: 0 0 10px 0;"><strong>Share this link:</strong></p>
      <a id="shareLink" href="#" target="_blank" style="word-break: break-all;"></a>
    </div>
  </div>

  <script>
    // Your specific Supabase credentials
    const supabaseUrl = 'https://jihtqbzrqymdkypicajz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Google Input Tools API for auto-transliteration
    async function autoTranslate(sourceId, targetId) {
      const sourceText = document.getElementById(sourceId).value;
      if (!sourceText) return;

      try {
        const response = await fetch(`https://inputtools.google.com/request?text=${sourceText}&itc=te-t-i0-und&num=1&cp=0&cs=1&ie=utf-8&oe=utf-8&app=demopage`);
        const data = await response.json();
        
        if (data[0] === 'SUCCESS') {
          // Extract the top Telugu word suggestion
          const teluguWord = data[1][0][1][0]; 
          document.getElementById(targetId).value = teluguWord;
        }
      } catch (error) {
        console.error("Translation error:", error);
      }
    }

    async function createInvitation() {
      const groomEn = document.getElementById('groomEn').value.trim();
      const brideEn = document.getElementById('brideEn').value.trim();
      const groomTe = document.getElementById('groomTe').value.trim();
      const brideTe = document.getElementById('brideTe').value.trim();

      if (!groomEn || !brideEn || !groomTe || !brideTe) {
        return alert('Please fill in all names in both languages.');
      }

      // Create a URL-friendly ID (e.g., "harsha-priya")
      const id = `${groomEn.toLowerCase()}-${brideEn.toLowerCase()}`.replace(/[^a-z0-9]+/g, '-');

      const { data, error } = await supabaseClient
        .from('invitations')
        .insert([{ 
          id: id, 
          groom_en: groomEn, 
          bride_en: brideEn, 
          groom_te: groomTe, 
          bride_te: brideTe 
        }]);

      if (error) {
        if(error.code === '23505') alert('This custom link already exists! Try adding a last initial.');
        else alert('Database Error: ' + error.message);
        return;
      }

      const baseUrl = window.location.origin;
      const finalLink = `${baseUrl}/marriage.html?id=${id}`;
      
      const shareLink = document.getElementById('shareLink');
      shareLink.href = finalLink;
      shareLink.textContent = finalLink;
      document.getElementById('resultBox').style.display = 'block';
    }
  </script>
</body>
</html>
