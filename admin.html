<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h2>Create Invitation</h2>

<input id="bride" placeholder="Bride Name"><br><br>
<input id="groom" placeholder="Groom Name"><br><br>
<input id="date" placeholder="Date"><br><br>
<input id="venue" placeholder="Venue"><br><br>

<select id="template"></select><br><br>

<button onclick="create()">Generate Link</button>

<p id="link"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL='https://jihtqbzrqymdkypicajz.supabase.co';
const SUPABASE_KEY='YOUR_KEY';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTemplates() {
  const { data } = await supabase.from('templates').select('*');

  const select = document.getElementById('template');

  data.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    select.appendChild(opt);
  });
}

loadTemplates();

async function create() {
  const bride_name = document.getElementById('bride').value;
  const groom_name = document.getElementById('groom').value;
  const date = document.getElementById('date').value;
  const venue = document.getElementById('venue').value;
  const template_id = document.getElementById('template').value;

  const { data } = await supabase
    .from('invitations')
    .insert([{ bride_name, groom_name, date, venue, template_id }])
    .select();

  const id = data[0].id;

  const url = window.location.origin + "/index.html?id=" + id;

  document.getElementById('link').innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
}
</script>

</body>
</html>
