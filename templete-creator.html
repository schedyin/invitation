<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Template Creator</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; font-family: monospace; }
    input, button { width: 100%; padding: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h2>Create New Template</h2>
  <input type="text" id="template-name" placeholder="Template Name (e.g., Floral Elegance)">
  <textarea id="html-code" placeholder="Paste your HTML here. Use {{bride_name}}, {{groom_name}}, {{event_date}} as placeholders."></textarea>
  <button onclick="saveTemplate()">Save Template</button>

<script>
    // FIX: Renamed the variable to 'supabaseClient' to avoid naming collisions
    const supabaseClient = supabase.createClient(
      'https://jihtqbzrqymdkypicajz.supabase.co', 
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
    );

    async function saveTemplate() {
      const name = document.getElementById('template-name').value;
      const html_code = document.getElementById('html-code').value;

      // FIX: Make sure to use 'supabaseClient' here to talk to the database
      const { error } = await supabaseClient.from('templates').insert([{ name, html_code }]);
      
      if (error) {
        alert('Error: ' + error.message);
      } else {
        alert('Template saved successfully!');
        document.getElementById('template-name').value = '';
        document.getElementById('html-code').value = '';
      }
    }
  </script>
</body>
</html>
