<!DOCTYPE html>
<html>
<head>
  <title>Template Creator</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      height: 100vh;
    }
    .left, .right {
      width: 50%;
      padding: 20px;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      height: 250px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 15px;
      margin-right: 10px;
      cursor: pointer;
    }
    .right {
      background: #f5f5f5;
      overflow: auto;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

<div class="left">
  <h2>Create Template</h2>

  <input id="name" placeholder="Template Name">

  <textarea id="html" placeholder="Paste HTML with {{placeholders}}"></textarea>

  <br><br>

  <button onclick="preview()">Preview</button>
  <button onclick="save()">Save</button>
  <button onclick="loadSample()">Load Sample</button>

  <p><b>Available placeholders:</b><br>
  {{bride_name}}, {{groom_name}}, {{date}}, {{venue}}</p>
</div>

<div class="right">
  <iframe id="previewFrame"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = 'https://jihtqbzrqymdkypicajz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw';

// ✅ FIXED naming
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔍 Preview function
function preview() {
  let html = document.getElementById('html').value;

  // Replace with dummy values for preview
  html = html
    .replaceAll('{{bride_name}}', 'Anjali')
    .replaceAll('{{groom_name}}', 'Rahul')
    .replaceAll('{{date}}', '25 Dec 2026')
    .replaceAll('{{venue}}', 'Hyderabad');

  const iframe = document.getElementById('previewFrame');
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  doc.open();
  doc.write(html);
  doc.close();
}

// 💾 Save template
async function save() {
  const name = document.getElementById('name').value;
  const html = document.getElementById('html').value;

  if (!name || !html) {
    alert("Enter name and HTML");
    return;
  }

  const { error } = await client
    .from('templates')
    .insert([{ name, html_code: html }]);

  if (error) {
    alert("Error saving template");
  } else {
    alert("Template saved successfully!");
  }
}

// 📦 Load sample template
function loadSample() {
  const sample = `
<div style="text-align:center; padding:40px; font-family:serif; background:#fff8e1;">
  <h1 style="color:gold;">{{groom_name}} ❤️ {{bride_name}}</h1>
  <h2>{{date}}</h2>
  <p>{{venue}}</p>
</div>
`;

  document.getElementById('html').value = sample;
}
</script>

</body>
</html>
