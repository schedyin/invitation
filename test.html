<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncSkill - Pack Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --text-sub: #64748b;
            --accent: #673DE6; --border: #e2e8f0; --radius: 12px;
            --font-main: 'IBM Plex Sans', sans-serif;
            --bg-light: #F8F9FA;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        
        .card { background: var(--surface); padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h2 { font-family: var(--font-main); margin-bottom: 1.5rem; color: var(--text); }
        
        .input-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-sub); }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(103, 61, 230, 0.1); }
        textarea { height: 150px; resize: vertical; font-family: monospace; }
        
        .btn { width: 100%; padding: 0.875rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--text); }
        
        .list-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; background: var(--bg); }
        .list-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .list-item-info h4 { font-family: var(--font-main); margin-bottom: 0.25rem; }
        .list-item-info span { font-size: 0.8rem; color: var(--accent); font-weight: 600; }

        /* Custom Dropdown Styles (Ported from your original code) */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface); transition: all 0.3s; font-size: 0.95rem; }
        .dropdown-header:hover { border-color: var(--text-sub); }
        .dropdown-header.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(103, 61, 230, 0.1); }
        .dropdown-icon { transition: transform 0.3s ease; width: 18px; height: 18px; color: var(--text-sub); }
        .dropdown-header.active .dropdown-icon { transform: rotate(180deg); color: var(--accent); }
        
        .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); z-index: 50; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s; list-style: none; max-height: 200px; overflow-y: auto; }
        .dropdown-list.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-list li { padding: 12px; cursor: pointer; transition: background 0.2s; font-size: 0.95rem; }
        .dropdown-list li:hover { background: var(--bg-light); color: var(--accent); }
        
        .create-new-cat { border-top: 1px solid var(--border); color: var(--accent) !important; font-weight: 600 !important; display: flex; align-items: center; gap: 8px; }
        .create-new-cat:hover { background: rgba(103, 61, 230, 0.05) !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Create Template Entry</h2>
        <div class="input-group">
            <label>Template Name</label>
            <input type="text" id="t-name" placeholder="e.g. Traditional Gold">
        </div>
        
        <div class="input-group">
            <label>Category</label>
            <div class="custom-dropdown" id="category-dropdown">
                <div class="dropdown-header">
                    <span class="selected-value" style="color: var(--text-sub);">Select Category...</span>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                <ul class="dropdown-list">
                    </ul>
                <input type="hidden" id="selected-category-name" value="">
            </div>
        </div>

        <div class="input-group">
            <label>Preview Image URL (or Base64)</label>
            <input type="text" id="t-image" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>HTML Code</label>
            <textarea id="t-code" placeholder="<html>...</html>"></textarea>
        </div>
        <button class="btn btn-outline" onclick="addTemplate()">+ Add to Bundle</button>
    </div>

    <div>
        <div class="card" style="margin-bottom: 1.5rem;">
            <h2>2. Templates in Bundle (<span id="count">0</span>)</h2>
            <div id="staging-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 1rem;">
                <p style="color: var(--text-sub); font-size: 0.9rem;">No templates added yet.</p>
            </div>
        </div>

        <div class="card">
            <h2>3. Encrypt & Export</h2>
            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="export-password" placeholder="Enter a strong password">
            </div>
            <button class="btn" onclick="exportEncryptedJSON()">Download Encrypted File</button>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE INIT ---
    // Make sure these match your actual Supabase keys
    const supabaseUrl = 'https://jihtqbzrqymdkypicajz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // --- CATEGORY DROPDOWN LOGIC ---
    const catHeader = document.querySelector('#category-dropdown .dropdown-header');
    const catList = document.querySelector('#category-dropdown .dropdown-list');
    const catHiddenName = document.getElementById('selected-category-name');
    const catSelectedValue = document.querySelector('#category-dropdown .selected-value');

    catHeader.addEventListener('click', (e) => {
        catList.classList.toggle('show');
        catHeader.classList.toggle('active');
        e.stopPropagation();
    });

    document.addEventListener('click', () => {
        catList.classList.remove('show');
        catHeader.classList.remove('active');
    });

    async function fetchCategories() {
        catSelectedValue.textContent = 'Loading...';
        const { data, error } = await supabaseClient.from('template_categories').select('name').order('name');
        
        catList.innerHTML = '';
        
        if (error) {
            catSelectedValue.textContent = 'Error loading categories';
            return;
        }

        if (data && data.length > 0) {
            catSelectedValue.textContent = 'Select Category...';
            data.forEach(cat => {
                const li = document.createElement('li');
                li.textContent = cat.name;
                li.addEventListener('click', (e) => selectCategory(cat.name, e));
                catList.appendChild(li);
            });
        }

        // "Create New" option
        const createLi = document.createElement('li');
        createLi.className = 'create-new-cat';
        createLi.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Create New Category
        `;
        createLi.addEventListener('click', async (e) => {
            e.stopPropagation();
            catList.classList.remove('show');
            catHeader.classList.remove('active');
            await createNewCategory();
        });
        catList.appendChild(createLi);
    }

    function selectCategory(name, event = null) {
        if(event) event.stopPropagation();
        // We store the NAME in the hidden input, because the importer creates missing categories by name
        catHiddenName.value = name; 
        catSelectedValue.textContent = name;
        catSelectedValue.style.color = 'var(--text)';
        catList.classList.remove('show');
        catHeader.classList.remove('active');
    }

    async function createNewCategory() {
        const newName = prompt("Enter the name for the new Category:");
        if (!newName || !newName.trim()) return;

        const safeName = newName.trim();

        // Push directly to Supabase so it's globally available immediately
        const { data, error } = await supabaseClient
            .from('template_categories')
            .insert([{ name: safeName }])
            .select()
            .single();

        if (error) {
            if (error.code === '23505') alert("A category with this name already exists!");
            else alert("Database Error: " + error.message);
        } else {
            await fetchCategories();
            selectCategory(data.name);
        }
    }

    // Initialize categories on load
    fetchCategories();

    // --- TEMPLATE BUNDLING LOGIC ---
    let templates = [];

    function addTemplate() {
        const name = document.getElementById('t-name').value.trim();
        const category = document.getElementById('selected-category-name').value;
        const image = document.getElementById('t-image').value.trim();
        const code = document.getElementById('t-code').value.trim();

        if(!name || !category || !code) return alert("Please fill Name, Category, and Code.");

        templates.push({ name, category_name: category, preview_image: image, html_code: code });
        
        // Clear specific form fields (leave category selected for rapid adding)
        document.getElementById('t-name').value = '';
        document.getElementById('t-code').value = '';
        
        renderList();
    }

    function renderList() {
        const list = document.getElementById('staging-list');
        document.getElementById('count').textContent = templates.length;
        list.innerHTML = '';
        
        templates.forEach(t => {
            list.innerHTML += `
                <div class="list-item">
                    <img src="${t.preview_image || 'https://via.placeholder.com/60'}" alt="Preview">
                    <div class="list-item-info">
                        <h4>${t.name}</h4>
                        <span>${t.category_name}</span>
                    </div>
                </div>
            `;
        });
    }

    function exportEncryptedJSON() {
        if(templates.length === 0) return alert("Add at least one template.");
        const password = document.getElementById('export-password').value;
        if(!password) return alert("Password is required to encrypt the file.");

        const jsonString = JSON.stringify(templates);
        const encrypted = CryptoJS.AES.encrypt(jsonString, password).toString();
        
        const blob = new Blob([encrypted], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `SyncSkill_Bundle_${new Date().getTime()}.sk`; 
        a.click();
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
