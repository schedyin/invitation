<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>గణేష్ & నోనాలి — శుభ వివాహం</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Suranna&family=Cinzel:wght@400;500;600&family=Noto+Serif+Telugu:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== COMBINED VARIABLES (LIGHT THEME) ========== */
        :root {
            /* Backgrounds */
            --ink: #FFFFFF;       /* Pure white */
            
            /* Text Colors */
            --ivory: #2C1A12;     /* Espresso Brown (Main dark text) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Gray background outside the mobile frame on desktop */
        html {
            background-color: #E5E7EB; 
            display: flex;
            justify-content: center;
        }

        body {
            font-family: 'Noto Serif Telugu', Georgia, serif;
            background: var(--ink);
            color: var(--ivory);
            overflow-x: hidden;
            
            /* Enforce Mobile-only width */
            width: 100%;
            max-width: 480px; 
            margin: 0 auto;
            min-height: 100vh;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.08); /* Slight shadow to separate from desktop background */
        }

        /* ── HERO SECTION ── */
        .hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 6rem 0 3.5rem; /* Increased top padding to accommodate big hangings */
        }

        .top-decor-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 5;
            pointer-events: none; /* So they don't block clicks */
        }

        .top-decor-full {
            width: 100%; /* Spans the entire width */
            height: auto;
            display: block;
            position: relative;
            z-index: 2; /* Keeps border above the hanging strings */
        }

        .hanging {
            position: absolute;
            z-index: 1; /* Hangs behind the top border */
            transform-origin: top center;
            animation: hangSwing 4s ease-in-out infinite alternate;
        }

        .hanging-outer {
            top: -2px;
            width: 6%; /* Even smaller size */
            max-width: 24px;
        }

        .hanging-inner {
            top: -12px; 
            width: 5%; /* Even smaller size */
            max-width: 20px;
            animation-duration: 5s;
            animation-direction: alternate-reverse;
        }

        .hanging.left { left: 3%; }
        .hanging.left-in { left: 15%; } /* Decreased gap */
        .hanging.right-in { right: 15%; } /* Decreased gap */
        .hanging.right { right: 3%; }

        @keyframes hangSwing {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
        }

        .hero-center-img {
            display: block;
            width: 85%;
            max-width: 250px; /* Increased from 200px */
            height: auto;
            margin: 1.2rem auto 0.8rem;
            filter: drop-shadow(0 8px 16px rgba(192, 57, 43, 0.15));
        }

        .hero-bottom-img {
            display: block;
            width: 100%;
            height: auto;
            margin: 0.2rem 0 0.5rem;
        }

        .hero-inner {
            position: relative;
            z-index: 2;
            width: 100%; /* Stretch to full width */
            text-align: center;
            animation: heroReveal 1.8s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes heroReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hero-sub {
            font-family: 'Suranna', serif;
            font-size: 1.6rem;
            letter-spacing: 0.05em;
            color: #3D7B89;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .scroll-cue {
            position: absolute;
            bottom: 0.8rem; /* Decreased from 1.5rem to bring it lower */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .scroll-cue-label {
            font-family: 'Cinzel', serif;
            font-size: 0.44rem;
            letter-spacing: 0.4em;
            color: #63C1A8;
            text-transform: uppercase;
            font-weight: 600;
        }

        .scroll-cue-track {
            width: 20px;
            height: 34px;
            border: 1px solid rgba(99, 193, 168, 0.6);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .scroll-cue-thumb {
            position: absolute;
            width: 4px;
            height: 8px;
            background: #63C1A8;
            border-radius: 2px;
            left: 50%;
            transform: translateX(-50%);
            top: 5px;
            animation: thumbSc 2s cubic-bezier(.4, 0, .6, 1) infinite;
        }

        @keyframes thumbSc {
            0% { top: 5px; opacity: 1; }
            70% { top: 18px; opacity: .4; }
            100% { top: 5px; opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- ========== HERO SECTION ========== -->
    <section class="hero" id="top">
        <div class="top-decor-container">
            <!-- 4 Hangings -->
            <img src="https://www.schedy.in/flower-hangings.webp" alt="Hanging Left Outer" class="hanging hanging-outer left">
            <img src="https://www.schedy.in/flower-hangings.webp" alt="Hanging Left Inner" class="hanging hanging-inner left-in">
            <img src="https://www.schedy.in/flower-hangings.webp" alt="Hanging Right Inner" class="hanging hanging-inner right-in">
            <img src="https://www.schedy.in/flower-hangings.webp" alt="Hanging Right Outer" class="hanging hanging-outer right">
            
            <!-- Top floral border -->
            <img src="https://www.schedy.in/flowers.png" alt="Top Decor" class="top-decor-full">
        </div>
        
        <div class="hero-inner">
            <p class="hero-sub">వెలుగుల వారి</p>
            <img src="https://www.schedy.in/image.svg" alt="Center Graphic" class="hero-center-img">
            <img src="https://www.schedy.in/hero.svg" alt="Bottom Graphic" class="hero-bottom-img">
        </div>
        
        <div class="scroll-cue">
            <div class="scroll-cue-track"><div class="scroll-cue-thumb"></div></div>
            <div class="scroll-cue-label">Scroll</div>
        </div>
    </section>

</body>
</html>
