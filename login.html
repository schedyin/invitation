<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Invitation System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F4F9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        h2 { color: #2B1664; margin-top: 0; font-weight: 700; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { outline: none; border-color: #673DE6; box-shadow: 0 0 0 3px rgba(103, 61, 230, 0.15); }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: #673DE6; color: white; }
        .btn-primary:hover { background: #5028c2; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-outline:hover { border-color: #673DE6; color: #673DE6; }
        
        .btn-google { background: white; border: 1px solid #e2e8f0; color: #334155; margin-top: 0; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider span { padding: 0 10px; }
        
        .message { margin-top: 15px; font-size: 14px; color: #ef4444; line-height: 1.4; font-weight: 500; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Welcome to Schedy</h2>
        <p style="color: #64748b; margin-bottom: 24px;">Please login or sign up to continue.</p>
        
        <button class="btn btn-google" onclick="handleGoogleLogin()">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Continue with Google
        </button>

        <div class="divider">
            <span>OR EMAIL</span>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">Login</button>
        <button class="btn btn-outline" onclick="handleSignup()">Sign Up</button>

        <div id="auth-message" class="message"></div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://jihtqbzrqymdkypicajz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
        );
        
        const msgEl = document.getElementById('auth-message');

        function performRouting(status) {
            // Instantly clear the #access_token hash from the URL
            if (window.location.hash) {
                history.replaceState(null, null, window.location.pathname);
            }

            if (status === 'admin') window.location.href = 'admin.html';
            else if (status === 'approved') window.location.href = 'templates.html';
            else if (status === 'declined') window.location.href = 'declined.html';
            else window.location.href = 'pending.html';
        }

        async function routeUser(user) {
            if (!user) return;

            let retries = 5;
            let profileData = null;

            // POLLING ENGINE: Patiently waits for Supabase to finish writing the profile
            while (retries > 0) {
                const { data, error } = await supabaseClient
                    .from('app_user_roles')
                    .select('status')
                    .eq('id', user.id)
                    .maybeSingle(); 

                if (data) {
                    profileData = data;
                    break;
                }

                msgEl.textContent = "Setting up profile, please wait...";
                msgEl.style.color = "#64748b";
                await new Promise(resolve => setTimeout(resolve, 800)); // wait 0.8s before trying again
                retries--;
            }

            if (profileData) {
                performRouting(profileData.status);
            } else {
                // FALLBACK: If trigger fails, explicitly save them to the DB as pending
                const { data: fallbackData } = await supabaseClient
                    .from('app_user_roles')
                    .upsert([{ id: user.id, email: user.email, status: 'pending' }])
                    .select()
                    .maybeSingle();

                if (fallbackData) {
                    performRouting(fallbackData.status);
                } else {
                    msgEl.textContent = "Error setting up profile. Please refresh.";
                    msgEl.style.color = "#ef4444";
                }
            }
        }

        // Master Listener: Catches users returning from Google or Email logins automatically
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                routeUser(session.user);
            }
        });

        // Instant check for already logged-in users
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) routeUser(session.user);
        });

        async function handleGoogleLogin() {
            msgEl.textContent = "Redirecting to Google...";
            msgEl.style.color = "#64748b";
            const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
            if (error) { msgEl.textContent = error.message; msgEl.style.color = "#ef4444"; }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) { msgEl.textContent = "Please enter both email and password."; return; }

            msgEl.textContent = "Logging in...";
            msgEl.style.color = "#64748b";

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { msgEl.textContent = error.message; msgEl.style.color = "#ef4444"; }
        }

        async function handleSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) { msgEl.textContent = "Please enter both email and password to sign up."; return; }

            msgEl.textContent = "Creating account...";
            msgEl.style.color = "#64748b";

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            
            if (error) {
                msgEl.textContent = error.message;
                msgEl.style.color = "#ef4444";
            } else if (data.session === null) {
                msgEl.textContent = "Signup successful! Please check your email to verify your account.";
                msgEl.style.color = "#10b981";
            } else {
                msgEl.textContent = "Signup successful! Routing...";
                msgEl.style.color = "#10b981";
            }
        }
    </script>
</body>
</html>
