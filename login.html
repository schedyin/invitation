<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Invitation System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F4F9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        h2 { color: #2B1664; margin-top: 0; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: #673DE6; box-shadow: 0 0 0 3px rgba(103, 61, 230, 0.15); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #673DE6; color: white; }
        .btn-primary:hover { background: #5028c2; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-outline:hover { border-color: #673DE6; color: #673DE6; }
        .message { margin-top: 15px; font-size: 14px; color: #ef4444; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Welcome to Schedy</h2>
        <p style="color: #64748b; margin-bottom: 20px;">Please login or sign up to continue.</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">Login</button>
        <button class="btn btn-outline" onclick="handleSignup()">Sign Up</button>

        <div id="auth-message" class="message"></div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://jihtqbzrqymdkypicajz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHRxYnpycXltZGt5cGljYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTQzNTUsImV4cCI6MjA4OTYzMDM1NX0.SK56YNRqHn-qBgSYvd9Q_sVIMC-76lv__zvao1esQHw'
        );
        
        const msgEl = document.getElementById('auth-message');

        async function routeUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;

            const { data: profile, error } = await supabaseClient.from('app_user_roles').select('status').eq('id', user.id).single();
            
            if (error || !profile) {
                msgEl.textContent = "Error fetching user profile permissions.";
                return;
            }

            // Route based on role
            if (profile.status === 'admin') window.location.href = 'admin.html';
            else if (profile.status === 'approved') window.location.href = 'templates.html'; // Sent to dashboard
            else if (profile.status === 'declined') window.location.href = 'declined.html';
            else window.location.href = 'pending.html';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                msgEl.textContent = "Please enter both email and password.";
                return;
            }

            msgEl.textContent = "Logging in...";
            msgEl.style.color = "#64748b";

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                msgEl.textContent = error.message;
                msgEl.style.color = "#ef4444";
            } else {
                await routeUser();
            }
        }

        async function handleSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                msgEl.textContent = "Please enter both email and password to sign up.";
                return;
            }

            msgEl.textContent = "Creating account...";
            msgEl.style.color = "#64748b";

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            
            if (error) {
                msgEl.textContent = error.message;
                msgEl.style.color = "#ef4444";
            } else {
                // THE FIX: Check if Supabase created a session. 
                // If session is null, email confirmation is turned ON in Supabase.
                if (data.session === null) {
                    msgEl.textContent = "Signup successful! Please check your email to verify your account before logging in.";
                    msgEl.style.color = "#10b981"; // Green success text
                } else {
                    msgEl.textContent = "Signup successful! Logging in...";
                    msgEl.style.color = "#10b981";
                    await routeUser();
                }
            }
        }

        // Check if already logged in when the page loads
        routeUser();
    </script>
</body>
</html>
